    const start = Date.now()

      try {

    //
    // V2-final fix (2026-05-25): only show fallback if the splash

    setTimeout(() => {

      if (c && isCanvasWorking(c)) {

        showFallback()
      }

    }, 12000)

    (function () {

      bar.insertBefore(btn, links);
