thers&quot;],&quot;plays&quot;:[0,88],&quot;pct&quot;:[0,0.425]}]]],&quot;reading&quot;:[1,[[0,{&quot;id&quot;:[0,1018731475],&quot;text&quot;:[0,&quot;这谁顶得住啊，\n日本服装巨头ZOZO，\n把他们内部搞服装虚拟试穿的顶级物理引擎\nppf-contact-solver（接触求解器）直接开源了！\n\n做虚拟时尚、数字服装、\n电影特效、甚至游戏物理的，\n这波福利直接白嫖顶级工业级工具啊！\n\n这玩意儿专治&quot;],&quot;title&quot;:[0,&quot;Tweets From HankAI&quot;],&quot;author&quot;:[0,&quot;@hank_aibtc on Twitter&quot;],&quot;date&quot;:[0,&quot;&quot;],&quot;url&quot;:[0,&quot;https://x.com/hank_aibtc/status/2058382186521526334&quot;]}],[0,{&quot;id&quot;:[0,1018731473],&quot;text&quot;:[0,&quot;卧槽，😱GitHub上刚挖到的神器map3d，基于OpenStreetMap，你在网页上框选一个区域，它就能自动把真实的建筑物、道路数据抓下来，一键渲染成自带高度的3D城市模型！\n\n🚀最狠的是还能直接导出GLB文件，塞进Blender或游戏引擎里当资产！&quot;],&quot;title&quot;:[0,&quot;Tweets From 比特币橙子Trader&quot;],&quot;author&quot;:[0,&quot;@oragnes on Twitter&quot;],&quot;date&quot;:[0,&quot;&quot;],&quot;url&quot;:[0,&quot;https://x.com/oragnes/status/2058383530535817375&quot;]}],[0,{&quot;id&quot;:[0,1018731471],&quot;text&quot;:[0,&quot;Codex でトップビューの画像から、3Dモデルに変換を試す\n\n「room.pngを元に、ローポリボクセルの教室を作って。\nVite + TypeScript + Three.js。\nテクスチャを $imagegen で生成して貼り付けて。」  \n\n!&quot;],&quot;title&quot;:[0,&quot;Tweets From 布留川英一 / Hidekazu Furukawa&quot;],&quot;author&quot;:[0,&quot;@npaka123 on Twitter&quot;],&quot;date&quot;:[0,&quot;&quot;],&quot;url&quot;:[0,&quot;https://x.com/npaka123/status/2058031349878194515&quot;]}],[0,{&quot;id&quot;:[0,1018690950],&quot;text&quot;:[0,&quot;Thanks to the community report, we recently identified a PR  that attempted to solve a non-existent issue and was submitted as part of a “PR training” workflow for resume building.\n\nThe contributor involved has been banned from the vLLM community.\n\nThis \n\n!&quot;],&quot;title&quot;:[0,&quot;Tweets From vLLM&quot;],&quot;author&quot;:[0,&quot;@vllm_project on Twitter&quot;],&quot;date&quot;:[0,&quot;&quot;],&quot;url&quot;:[0,&quot;https://x.com/vllm_project/status/2058358072020779391&quot;]}],[0,{&quot;id&quot;:[0,1018425926],&quot     (function() {
      var switcher = document.getElementById('themeSwitcher');
      var modeToggle = document.getElementById('modeToggle');

      // Mode toggle (light/dark)
      function updateModeIcon() {
        var isLight = document.documentElement.getAttribute('data-mode') === 'light';
        switcher.classList.toggle('light-mode', isLight);
      }
      modeToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var current = document.documentElement.getAttribute('data-mode');
        var next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-mode', next);
        localStorage.setItem('blog-mode', next);
        localStorage.setItem('blog-mode-set', '1');
        updateModeIcon();
        if (typeof umami !== 'undefined') {
          umami.track('dark-mode-toggle', { mode: next });
          umami.identify({ theme: next });
        }
      });
      updateModeIcon();
    })();
  </script> <!-- Mobile masthead dropdown: inject hamburger + wire toggle on any page with .mast-bar --> <script>
    (function () {
      var bar = document.querySelector('.mast-bar');
      var links = document.querySelector('.mast-bar .mast-links');
      if (!bar || !links) return;
      // If a page already has its own mast-toggle, don't inject a duplicate
      if (bar.querySelector('.mast-toggle')) return;

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'mast-toggle';
      btn.setAttribute('aria-label', 'Open menu');
      btn.setAttribute('aria-expanded', 'false');
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4h12 M2 8h12 M2 12h12"/></svg>';
      bar.insertBefore(btn, links);

      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = links.classList.toggle('open');
        btn.setAttribute('aria-expanded', String(open));
      });
      document.addEventListener('click', function (e) {
        if (!links.contains(e.target) && !btn.contains(e.target)) {
          links.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        }
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && links.classList.contains('open')) {
          links.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        }
      });
    })();
