name: Daily Report

on:
  schedule:
    # 01:03 UTC = 09:03 BJT
    - cron: '3 1 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build and send report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HOMEPAGE_SB_KEY: ${{ secrets.HOMEPAGE_SB_KEY }}
          BLOG_SB_URL: ${{ secrets.BLOG_SB_URL }}
          BLOG_SB_KEY: ${{ secrets.BLOG_SB_KEY }}
          CHAT_SB_URL: ${{ secrets.CHAT_SB_URL }}
          CHAT_SB_KEY: ${{ secrets.CHAT_SB_KEY }}
          UMAMI_API_URL: ${{ secrets.UMAMI_API_URL }}
          UMAMI_API_KEY: ${{ secrets.UMAMI_API_KEY }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
        run: python3 scripts/daily_report.py
