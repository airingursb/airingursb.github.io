name: Deploy

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update feed data
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          RAINDROP_TOKEN: ${{ secrets.RAINDROP_TOKEN }}
        run: python3 scripts/update_feed.py

      - name: Sync moments from Telegram
        env:
          BLOG_SUPABASE_URL: ${{ secrets.BLOG_SUPABASE_URL }}
          BLOG_SUPABASE_SERVICE_KEY: ${{ secrets.BLOG_SUPABASE_SERVICE_KEY }}
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          COS_DIRECTORY: ${{ secrets.COS_DIRECTORY }}
          COS_DOMAIN: ${{ secrets.COS_DOMAIN }}
        run: python3 scripts/sync_moments.py

      - name: Build Astro site
        env:
          BLOG_SUPABASE_URL: ${{ secrets.BLOG_SUPABASE_URL }}
          BLOG_SUPABASE_SERVICE_KEY: ${{ secrets.BLOG_SUPABASE_SERVICE_KEY }}
        run: npm run build

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ index.html
          git diff --staged --quiet || git commit -m "chore: update feed articles"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Deploy to Aliyun server
        env:
          DEPLOY_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 39.105.102.252 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ root@39.105.102.252:/var/www/ursb.me/
          rm -f ~/.ssh/deploy_key
