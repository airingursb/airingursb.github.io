name: Deploy

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update feed articles
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          RAINDROP_TOKEN: ${{ secrets.RAINDROP_TOKEN }}
        run: python3 scripts/update_feed.py

      - name: Commit updated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update feed articles"
          git push

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/ 2>/dev/null || true
          cp baidu_verify_codeva-*.html _site/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site

      - name: Deploy to Aliyun server
        env:
          DEPLOY_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 39.105.102.252 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            _site/ root@39.105.102.252:/var/www/ursb.me/
          rm -f ~/.ssh/deploy_key
