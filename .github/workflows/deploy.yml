name: Deploy

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [strip-published]

permissions:
  contents: write

# Serialize deploys: when a new push lands, cancel any in-flight deploy.
# Prevents the "Commit updated data" race where 2 concurrent CI runs both
# try to git-push the feed update commit; the slower one gets rejected.
concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history — post dateModified (JSON-LD freshness) comes from git log.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update feed data
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          RAINDROP_TOKEN: ${{ secrets.RAINDROP_TOKEN }}
        run: python3 scripts/update_feed.py

      - name: Sync moments from Telegram
        # Non-critical analytics-style sync. Supabase IO budget can exhaust
        # (esp. on long runs), and that must NOT block the static site deploy.
        continue-on-error: true
        env:
          BLOG_SUPABASE_URL: ${{ secrets.BLOG_SUPABASE_URL }}
          BLOG_SUPABASE_SERVICE_KEY: ${{ secrets.BLOG_SUPABASE_SERVICE_KEY }}
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          COS_DIRECTORY: ${{ secrets.COS_DIRECTORY }}
          COS_DOMAIN: ${{ secrets.COS_DOMAIN }}
        run: python3 scripts/sync_moments.py

      - name: Build Astro site
        env:
          BLOG_SUPABASE_URL: ${{ secrets.BLOG_SUPABASE_URL }}
          BLOG_SUPABASE_SERVICE_KEY: ${{ secrets.BLOG_SUPABASE_SERVICE_KEY }}
          PUBLIC_MAPBOX_TOKEN: ${{ secrets.PUBLIC_MAPBOX_TOKEN }}
        run: npm run build

      - name: Commit updated data
        # Resilient against concurrent CI runs racing to push feed updates.
        # Pull --rebase + retry handles the "non-fast-forward" rejection cleanly.
        # Skip the whole step if nothing to commit (no feed change → no commit).
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ index.html
          if git diff --staged --quiet; then
            echo "No feed changes to commit, skipping."
            exit 0
          fi
          git commit -m "chore: update feed articles"
          # Retry push up to 3 times with rebase on conflict (concurrent CI runs)
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push attempt $i rejected, rebasing and retrying..."
            git pull --rebase --autostash origin master
            sleep $((i * 2))
          done
          echo "Push failed after 3 attempts. Deploy will proceed anyway (feed update non-critical)."
          exit 0

      - name: Deploy to GitHub Pages
        # Pin to v3.9.3 (2023, long-stable). v4.1.0 (May 2026) started returning
        # "Invalid username or token. Password authentication is not supported"
        # on push to gh-pages despite contents:write permission being set.
        # If v3 also breaks later, switch to actions/deploy-pages@v4 (official).
        uses: peaceiris/actions-gh-pages@v3.9.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Deploy to Aliyun server
        env:
          DEPLOY_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 39.105.102.252 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ root@39.105.102.252:/var/www/ursb.me/
          rm -f ~/.ssh/deploy_key

      - name: Ping IndexNow (Bing / AI search index)
        # Submits all sitemap URLs so Bing-backed engines (incl. ChatGPT search,
        # Copilot) pick up new/updated pages immediately. Failures are non-fatal.
        continue-on-error: true
        run: |
          KEY=61393505e5fecda4e15503676ef607f0
          urls=$(grep -o '<loc>[^<]*</loc>' dist/sitemap.xml | sed 's/<[^>]*>//g' | head -2000 | jq -R . | jq -s -c .)
          count=$(echo "$urls" | jq 'length')
          echo "Submitting $count URLs to IndexNow"
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"ursb.me\",\"key\":\"$KEY\",\"keyLocation\":\"https://ursb.me/$KEY.txt\",\"urlList\":$urls}" \
            -w "\nHTTP %{http_code}\n"
