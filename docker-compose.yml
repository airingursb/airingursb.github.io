services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    user: "0:0"
    command: >
      sh -c "
        mkdir -p /home/node/.openclaw/agents/anling/agent /home/node/.openclaw/workspace &&
        cp /mnt/config/openclaw.json /home/node/.openclaw/openclaw.json &&
        cp /mnt/config/auth-profiles.json /home/node/.openclaw/agents/anling/agent/auth-profiles.json &&
        cp -r /mnt/workspace/* /home/node/.openclaw/workspace/ 2>/dev/null || true &&
        chown -R node:node /home/node/.openclaw &&
        exec su -s /bin/sh node -c 'openclaw gateway --bind lan'
      "
    ports:
      - "18790:18789"
    volumes:
      - openclaw-data:/home/node/.openclaw
      - ./services/openclaw/config:/mnt/config:ro
      - ./services/openclaw/workspace:/mnt/workspace:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  chat-middleware:
    build: ./services/chat
    ports:
      - "8904:3000"
    env_file:
      - ./services/chat/.env
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  openclaw-data:
