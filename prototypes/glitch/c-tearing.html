<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C. TEARING — Cyber Prototypes</title>
<link rel="stylesheet" href="./shared.css">
<style>
  /* the SVG turbulence filter is applied to the stage during scroll */
  #tear-stage {
    will-change: filter, transform;
    transition: filter 0.25s;
  }
  #tear-stage.tearing { filter: url(#tear-filter); }

  /* a horizontal "scan slip" overlay that briefly flashes during heavy scroll */
  .slip {
    position: fixed;
    left: 0; right: 0;
    height: 28px;
    pointer-events: none;
    z-index: 9999;
    background: linear-gradient(180deg,
      transparent,
      rgba(0, 220, 255, 0.18) 45%,
      rgba(255, 0, 110, 0.18) 55%,
      transparent);
    opacity: 0;
    mix-blend-mode: screen;
  }

  /* magenta/cyan edge ghost when tearing intensifies */
  #tear-stage.tearing .name {
    text-shadow:
      2px 0 var(--neon-red),
      -2px 0 var(--neon-cyan);
  }
</style>
</head>
<body>
  <div class="topbar" id="topbar"></div>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <filter id="tear-filter" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0 0" numOctaves="2" seed="3" id="turb"/>
        <feDisplacementMap in="SourceGraphic" scale="0" id="disp" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div id="tear-stage">
    <div class="scene"><div class="card" id="mockCard"></div></div>
    <div class="below" id="below"></div>
  </div>

  <script src="./shared.js"></script>
  <script>
    GLITCH.init('C', 'TEARING', 'Horizontal slip + turbulence on scroll. Stop = relax.', {
      trigger: true, live: true, intensity: true
    });

    var disp = document.getElementById('disp');
    var turb = document.getElementById('turb');
    var stage = document.getElementById('tear-stage');
    var live = true;
    var sensitivity = 1; // medium
    var loopTimer = null;

    function setIntensity(v) {
      sensitivity = v === 'low' ? 0.4 : v === 'high' ? 2.2 : 1;
    }

    var lastScroll = window.scrollY;
    var lastTime = performance.now();
    var currentScale = 0;

    window.addEventListener('scroll', function() {
      var now = performance.now();
      var dt = Math.max(8, now - lastTime);
      var velocity = Math.abs(window.scrollY - lastScroll) / dt * 1000; // px/s
      lastScroll = window.scrollY; lastTime = now;
      var target = Math.min(35, velocity / 80) * sensitivity;
      if (target > currentScale) currentScale = target;
      apply();
      maybeSlip(velocity);
    });

    function apply() {
      stage.classList.toggle('tearing', currentScale > 0.5);
      disp.setAttribute('scale', currentScale.toFixed(2));
      var freq = 0.001 + (currentScale / 600);
      turb.setAttribute('baseFrequency', '0 ' + freq.toFixed(4));
    }

    // relax loop
    setInterval(function() {
      if (currentScale > 0.05) {
        currentScale *= 0.85;
        if (currentScale < 0.05) currentScale = 0;
        apply();
      }
    }, 40);

    function maybeSlip(v) {
      if (v < 600) return;
      var slip = document.createElement('div');
      slip.className = 'slip';
      slip.style.top = (Math.random() * window.innerHeight) + 'px';
      document.body.appendChild(slip);
      requestAnimationFrame(function() {
        var tx = (Math.random() - 0.5) * 60 * sensitivity;
        slip.style.transition = 'transform 0.18s ease-out, opacity 0.32s ease-out';
        slip.style.transform = 'translateX(' + tx + 'px)';
        slip.style.opacity = '1';
        setTimeout(function() { slip.style.opacity = '0'; }, 140);
        setTimeout(function() { slip.remove(); }, 500);
      });
    }

    // periodic spontaneous burst so the effect is visible without scrolling
    function loop() {
      if (!live) return;
      currentScale = Math.max(currentScale, 12 * sensitivity);
      apply();
      maybeSlip(900);
      maybeSlip(900);
      var next = 4000 + Math.random() * 4500;
      loopTimer = setTimeout(loop, next);
    }

    document.getElementById('triggerBtn').addEventListener('click', function() {
      currentScale = Math.max(currentScale, 22 * sensitivity);
      apply();
      maybeSlip(1200); maybeSlip(1200); maybeSlip(1200);
    });
    document.getElementById('liveBtn').addEventListener('click', function() {
      live = !live;
      this.textContent = live ? 'Auto: ON' : 'Auto: OFF';
      this.classList.toggle('live', live);
      if (live) loop();
      else if (loopTimer) clearTimeout(loopTimer);
    });
    document.getElementById('intensitySel').addEventListener('change', function() {
      setIntensity(this.value);
    });

    setTimeout(loop, 1500);
  </script>
</body>
</html>
