<!doctype html>
<html lang="zh-CN" data-mode="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A+E. FINAL — Cyber Prototypes</title>
<link rel="stylesheet" href="./shared.css">
<style>
  /* light-mode test surface (just so the toggle in topbar visibly changes the page) */
  [data-mode="light"] {
    --c-bg: #ffffff;
    --c-bg-alt: #f6f8fa;
    --c-text: #1f2328;
    --c-text-muted: #656d76;
    --c-text-dim: #8b949e;
    --c-border: #d8dee4;
    --c-border-light: #d0d7de;
    --accent: #16a34a;
    --accent-rgb: 22, 163, 74;
  }

  /* ========= A. components (additive, runtime-driven) ========= */
  body { will-change: transform, filter; }

  /* RGB shift: text-shadow set per-frame from JS via vars */
  body.fx-rgb .greeting,
  body.fx-rgb .name,
  body.fx-rgb .role,
  body.fx-rgb .chat-prompt,
  body.fx-rgb .chat-input,
  body.fx-rgb .links a,
  body.fx-rgb .sep,
  body.fx-rgb .social span,
  body.fx-rgb .below h2,
  body.fx-rgb .below .post-title,
  body.fx-rgb .below .post-meta,
  body.fx-rgb .below p {
    text-shadow:
      var(--rx, 0) 0 var(--c-r, transparent),
      var(--cx, 0) 0 var(--c-c, transparent);
  }

  /* slice band */
  .fx-band {
    position: fixed; left: 0; right: 0;
    height: 14px;
    pointer-events: none;
    z-index: 9999;
    background: linear-gradient(180deg,
      transparent,
      rgba(0, 220, 255, 0.07) 35%,
      rgba(255, 0, 110, 0.07) 65%,
      transparent);
    mix-blend-mode: screen;
  }

  /* scanlines pulse — only used by 'full' flavor */
  .fx-scan {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9998;
    background: repeating-linear-gradient(0deg,
      transparent 0 5px,
      rgba(255, 0, 110, 0.035) 5px 6px);
  }

  /* ========= E ========= */
  .scramble-flash { position: relative; }
  .scramble-flash::after {
    content: '';
    position: absolute;
    left: -4px; right: -4px; top: -2px; bottom: -2px;
    background: rgba(var(--accent-rgb), 0.10);
    pointer-events: none;
    opacity: 0;
    border-radius: 2px;
    transition: opacity 0.4s;
  }
  .scramble-flash.flashing::after { opacity: 1; transition: opacity 0.05s; }

  /* status panel */
  .status {
    position: fixed; left: 16px; bottom: 16px;
    z-index: 100;
    padding: 10px 14px;
    background: rgba(13, 17, 23, 0.92);
    border: 1px solid var(--c-border);
    border-radius: 6px;
    font-size: 11px;
    color: var(--c-text-muted);
    line-height: 1.7;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    min-width: 260px;
  }
  [data-mode="light"] .status {
    background: rgba(255, 255, 255, 0.92);
  }
  .status .k { color: var(--c-text-dim); display: inline-block; min-width: 96px; }
  .status .v { color: var(--accent); font-variant-numeric: tabular-nums; }
  .status .v.warn { color: #fbbf24; }
  .status .v.idle { color: var(--c-text-dim); }
  .status .v.skip { color: #f87171; }
</style>
</head>
<body>
  <div class="topbar" id="topbar"></div>
  <div class="scene"><div class="card" id="mockCard"></div></div>
  <div class="below" id="below"></div>

  <div class="status" id="status">
    <div><span class="k">mode:</span> <span class="v" id="sMode">FAST · dark</span></div>
    <div><span class="k">hero glitch:</span> <span class="v idle" id="sHero">pending…</span></div>
    <div><span class="k">dwell:</span> <span class="v idle" id="sDwell">0.0s</span></div>
    <div><span class="k">E threshold:</span> <span class="v" id="sThr">8s</span></div>
    <div><span class="k">E ambient:</span> <span class="v idle" id="sAmb">off</span></div>
    <div><span class="k">next A:</span> <span class="v" id="sNextA">—</span></div>
    <div><span class="k">last A:</span> <span class="v" id="sLastA">—</span></div>
  </div>

  <script src="./shared.js"></script>
  <script>
    GLITCH.init('A+E', 'FINAL v3', 'Dark-only · weekly hero glitch · E ambient at 30s · scroll/dwell triggers.', {
      trigger: true, live: true, intensity: false
    });

    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function isDark() {
      return document.documentElement.getAttribute('data-mode') !== 'light';
    }

    /* ========= timing presets ========= */
    var REAL = {
      GLITCH_MIN: 60_000, GLITCH_MAX: 120_000, GLITCH_WARMUP: 30_000,
      DWELL_THR: 30_000, AMBIENT_MIN: 8_000, AMBIENT_MAX: 12_000,
      SCROLL_THR: 1500, SCROLL_COOLDOWN: 700,
      HERO_DELAY: 1200
    };
    var FAST = {
      GLITCH_MIN: 5_000, GLITCH_MAX: 10_000, GLITCH_WARMUP: 3_000,
      DWELL_THR: 8_000, AMBIENT_MIN: 4_000, AMBIENT_MAX: 6_500,
      SCROLL_THR: 1500, SCROLL_COOLDOWN: 600,
      HERO_DELAY: 1200
    };
    var P = FAST;

    /* ========= A: flavor definitions ========= */
    // weight totals to 100. Each flavor is a recipe of components + intensity ranges.
    var FLAVORS = [
      { name: 'hum',    w: 35, scene: 0,    rgb: 0.55, hue: 0,  band: 0,   scan: 0, dur: [200, 280] },
      { name: 'pulse',  w: 22, scene: 1.0,  rgb: 0.6,  hue: 0,  band: 0,   scan: 0, dur: [220, 320] },
      { name: 'chroma', w: 15, scene: 0,    rgb: 0.7,  hue: 6,  band: 0,   scan: 0, dur: [300, 400] },
      { name: 'slice',  w: 12, scene: 0,    rgb: 0.45, hue: 0,  band: 1.0, scan: 0, dur: [260, 360] },
      { name: 'jolt',   w:  8, scene: 1.4,  rgb: 0,    hue: 12, band: 0,   scan: 0, dur: [240, 340] },
      { name: 'full',   w:  8, scene: 1.6,  rgb: 0.75, hue: 14, band: 1.0, scan: 1, dur: [380, 500] }
    ];
    // RGB color pairs (red/cyan, pink/blue, amber/cyan-light)
    var RGB_PAIRS = [
      ['rgba(255, 0, 110, _A_)',  'rgba(0, 220, 255, _A_)'],
      ['rgba(255, 80, 180, _A_)', 'rgba(60, 180, 255, _A_)'],
      ['rgba(255, 180, 40, _A_)', 'rgba(80, 255, 255, _A_)']
    ];

    function rand(a, b) { return a + Math.random() * (b - a); }
    function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
    function randSign() { return Math.random() < 0.5 ? -1 : 1; }
    function pickWeighted(arr) {
      var total = arr.reduce(function(s, f) { return s + f.w; }, 0);
      var r = Math.random() * total;
      for (var i = 0; i < arr.length; i++) {
        r -= arr[i].w;
        if (r <= 0) return arr[i];
      }
      return arr[arr.length - 1];
    }

    /* ========= component implementations ========= */
    function sceneShake(intensity, durMs) {
      // Generate 4–7 random translate waypoints. Snap to 0 at 0% and 100%.
      var n = randInt(4, 7);
      var amp = 1.2 * intensity; // base 1px, max ~2.5px at intensity=1.6 (full)
      var keyframes = [{ transform: 'translate(0,0)' }];
      for (var i = 1; i < n - 1; i++) {
        var x = (Math.random() * 2 - 1) * amp;
        var y = (Math.random() * 2 - 1) * amp * 0.7;
        keyframes.push({ transform: 'translate(' + x.toFixed(2) + 'px,' + y.toFixed(2) + 'px)' });
      }
      keyframes.push({ transform: 'translate(0,0)' });
      var anim = document.body.animate(keyframes, {
        duration: durMs,
        easing: 'steps(' + n + ', end)',
        fill: 'none'
      });
      return anim;
    }

    function rgbShift(intensity, durMs) {
      // intensity 0–1: max amplitude px
      var maxPx = 1 + intensity * 2.5; // up to ~3px at intensity 0.75
      var pair = RGB_PAIRS[randInt(0, RGB_PAIRS.length - 1)];
      var alpha = 0.45 + intensity * 0.25; // 0.45–0.70
      var cR = pair[0].replace('_A_', alpha.toFixed(2));
      var cC = pair[1].replace('_A_', alpha.toFixed(2));
      var b = document.body;
      b.style.setProperty('--c-r', cR);
      b.style.setProperty('--c-c', cC);
      b.classList.add('fx-rgb');
      var start = performance.now();
      var raf = 0;
      function tick(now) {
        var t = (now - start) / durMs;
        if (t >= 1) {
          b.classList.remove('fx-rgb');
          return;
        }
        // every ~33ms, jitter both shifts independently
        var rx = (Math.random() * 2 - 1) * maxPx * (1 - t * 0.5); // decay slightly
        var cx = (Math.random() * 2 - 1) * maxPx * (1 - t * 0.5);
        b.style.setProperty('--rx', rx.toFixed(2) + 'px');
        b.style.setProperty('--cx', cx.toFixed(2) + 'px');
        raf = requestAnimationFrame(tick);
      }
      raf = requestAnimationFrame(tick);
    }

    function hueShift(deg, durMs) {
      // single hue pulse: 0 → ±deg → 0
      var dir = randSign();
      var b = document.body;
      var start = performance.now();
      function tick(now) {
        var t = (now - start) / durMs;
        if (t >= 1) { b.style.filter = ''; return; }
        var k = Math.sin(t * Math.PI); // 0 → 1 → 0
        b.style.filter = 'hue-rotate(' + (dir * deg * k).toFixed(2) + 'deg)';
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function sliceBand(durMs) {
      var band = document.createElement('div');
      band.className = 'fx-band';
      band.style.top = (10 + Math.random() * 60) + '%'; // 10–70% from top
      document.body.appendChild(band);
      var dx = (Math.random() * 60 + 20) * randSign();
      band.animate([
        { transform: 'translateX(0)', opacity: 0 },
        { transform: 'translateX(' + (dx * 0.3).toFixed(0) + 'px)', opacity: 1, offset: 0.15 },
        { transform: 'translateX(' + dx.toFixed(0) + 'px)', opacity: 1, offset: 0.7 },
        { transform: 'translateX(' + (dx * 1.1).toFixed(0) + 'px)', opacity: 0 }
      ], { duration: durMs, easing: 'steps(6, end)' }).onfinish = function() {
        band.remove();
      };
    }

    function scanPulse(durMs) {
      var s = document.createElement('div');
      s.className = 'fx-scan';
      document.body.appendChild(s);
      s.animate([
        { opacity: 0, transform: 'translateY(0)' },
        { opacity: 1, transform: 'translateY(-4px)', offset: 0.3 },
        { opacity: 0.6, transform: 'translateY(2px)', offset: 0.7 },
        { opacity: 0, transform: 'translateY(0)' }
      ], { duration: durMs, easing: 'steps(8, end)' }).onfinish = function() {
        s.remove();
      };
    }

    /* ========= A: orchestrator ========= */
    var lastFlavor = '—';
    var glitchActive = false;

    function fireGlitch(forceFlavor) {
      if (reduce || !isDark()) {
        document.getElementById('sLastA').textContent = isDark() ? '(reduced)' : '(skipped: light)';
        document.getElementById('sLastA').className = 'v skip';
        return;
      }
      var flavor = forceFlavor || pickWeighted(FLAVORS);
      var dur = rand(flavor.dur[0], flavor.dur[1]);
      lastFlavor = flavor.name;
      glitchActive = true;
      setTimeout(function() { glitchActive = false; }, dur + 20);

      if (flavor.scene > 0) sceneShake(flavor.scene, dur);
      if (flavor.rgb > 0)   rgbShift(flavor.rgb, dur);
      if (flavor.hue > 0)   hueShift(flavor.hue, dur);
      if (flavor.band > 0)  sliceBand(dur);
      if (flavor.scan > 0)  scanPulse(dur);

      var el = document.getElementById('sLastA');
      el.textContent = flavor.name + ' · ' + Math.round(dur) + 'ms';
      el.className = 'v';
    }

    /* ========= A: scheduler ========= */
    var glitchTimer = null;
    var nextGlitchAt = 0;

    function scheduleGlitch(initial) {
      clearTimeout(glitchTimer);
      var base = initial ? P.GLITCH_WARMUP : 0;
      var delay = base + P.GLITCH_MIN + Math.random() * (P.GLITCH_MAX - P.GLITCH_MIN);
      nextGlitchAt = performance.now() + delay;
      glitchTimer = setTimeout(function() {
        if (!document.hidden && isDark()) fireGlitch();
        scheduleGlitch(false);
      }, delay);
    }

    /* ========= E ========= */
    var allScrambles = [];
    var ambientTimer = null;
    var ambientStarted = false;
    var visibleTime = 0;
    var lastVisTick = performance.now();

    function flash(el) {
      el.classList.add('scramble-flash', 'flashing');
      setTimeout(function() { el.classList.remove('flashing'); }, 60);
    }

    function scrambleEl(el, opts) {
      if (!el || reduce) return;
      if (glitchActive) return;
      var t = (el.textContent || '').trim();
      if (!t) return;
      flash(el);
      GLITCH.scramble(el, t, opts || { duration: 600 });
    }

    function visible() {
      return allScrambles.filter(function(el) {
        var r = el.getBoundingClientRect();
        return r.bottom > 60 && r.top < window.innerHeight - 40;
      });
    }

    function burstVisible(count) {
      var v = visible();
      if (!v.length) return;
      for (var i = 0; i < count && v.length; i++) {
        var idx = Math.floor(Math.random() * v.length);
        var el = v.splice(idx, 1)[0];
        scrambleEl(el, { duration: 460, from: 'random', settleDuration: 140 });
      }
    }

    function bind() {
      document.querySelectorAll('.scrambleable').forEach(function(el) {
        if (el.__bound) return;
        el.__bound = true;
        allScrambles.push(el);
      });
    }

    function scheduleAmbient() {
      clearTimeout(ambientTimer);
      var delay = P.AMBIENT_MIN + Math.random() * (P.AMBIENT_MAX - P.AMBIENT_MIN);
      ambientTimer = setTimeout(function() {
        if (!document.hidden) burstVisible(1);
        scheduleAmbient();
      }, delay);
    }

    /* scroll velocity */
    var scrollLastY = window.scrollY;
    var scrollLastT = performance.now();
    var lastBurst = 0;
    window.addEventListener('scroll', function() {
      var now = performance.now();
      var dt = Math.max(8, now - scrollLastT);
      var v = Math.abs(window.scrollY - scrollLastY) / dt * 1000;
      scrollLastY = window.scrollY;
      scrollLastT = now;
      if (v > P.SCROLL_THR && now - lastBurst > P.SCROLL_COOLDOWN) {
        lastBurst = now;
        burstVisible(2);
      }
    }, { passive: true });

    /* dwell ticker */
    function tickDwell() {
      var now = performance.now();
      if (!document.hidden) visibleTime += now - lastVisTick;
      lastVisTick = now;
      if (!ambientStarted && visibleTime >= P.DWELL_THR) {
        ambientStarted = true;
        scheduleAmbient();
      }
      var dwellSec = (visibleTime / 1000).toFixed(1);
      var thrSec = (P.DWELL_THR / 1000).toFixed(0);
      document.getElementById('sDwell').textContent = dwellSec + 's';
      document.getElementById('sDwell').classList.toggle('idle', visibleTime < P.DWELL_THR);
      document.getElementById('sThr').textContent = thrSec + 's';
      document.getElementById('sAmb').textContent = ambientStarted ? 'ON' : 'off';
      document.getElementById('sAmb').classList.toggle('idle', !ambientStarted);
      var nextAtMs = Math.max(0, nextGlitchAt - now);
      var nextEl = document.getElementById('sNextA');
      if (!isDark()) {
        nextEl.textContent = '— (light mode)';
        nextEl.className = 'v skip';
      } else {
        nextEl.textContent = (nextAtMs / 1000).toFixed(1) + 's';
        nextEl.className = 'v';
      }
    }
    setInterval(tickDwell, 250);

    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        clearTimeout(glitchTimer);
        clearTimeout(ambientTimer);
      } else {
        scheduleGlitch(false);
        if (ambientStarted) scheduleAmbient();
      }
      lastVisTick = performance.now();
    });

    /* watch theme changes */
    new MutationObserver(function() {
      // when switching modes, reschedule (no fire happens during the mismatched mode anyway)
      tickDwell();
    }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-mode'] });

    /* hero glitch — once per week, after hero scramble settles */
    var HERO_KEY = 'glitch-hero-week';
    function currentWeekId() {
      // 7-day buckets since Unix epoch (rolls over Thursday UTC)
      return Math.floor(Date.now() / 604800000);
    }
    function heroFiredThisWeek() {
      try { return localStorage.getItem(HERO_KEY) === String(currentWeekId()); }
      catch (e) { return false; }
    }
    function markHeroFired() {
      try { localStorage.setItem(HERO_KEY, String(currentWeekId())); } catch (e) {}
    }
    function tryHeroGlitch() {
      if (reduce || !isDark() || document.hidden) return;
      if (heroFiredThisWeek()) {
        document.getElementById('sHero').textContent = 'already fired this week';
        document.getElementById('sHero').className = 'v idle';
        return;
      }
      // pick from soft tier only (hum / pulse / chroma)
      var soft = FLAVORS.filter(function(f) {
        return f.name === 'hum' || f.name === 'pulse' || f.name === 'chroma';
      });
      var f = pickWeighted(soft);
      fireGlitch(f);
      markHeroFired();
      document.getElementById('sHero').textContent = 'fired (' + f.name + ')';
      document.getElementById('sHero').className = 'v';
    }

    /* boot */
    bind();
    if (!reduce) {
      setTimeout(tryHeroGlitch, P.HERO_DELAY);
      scheduleGlitch(true);
    } else {
      document.getElementById('sHero').textContent = '— (reduced motion)';
      document.getElementById('sHero').className = 'v skip';
    }

    setTimeout(function() {
      var name = document.querySelector('.name');
      if (name) name.addEventListener('mouseenter', function() { fireGlitch(); });
    }, 200);

    /* ========= controls ========= */
    var triggerBtn = document.getElementById('triggerBtn');
    triggerBtn.textContent = 'Trigger A (random)';
    triggerBtn.addEventListener('click', function() { fireGlitch(); });

    var liveBtn = document.getElementById('liveBtn');
    liveBtn.classList.remove('live');
    liveBtn.textContent = 'Speed: FAST';
    liveBtn.addEventListener('click', function() {
      var isFast = P === FAST;
      P = isFast ? REAL : FAST;
      this.textContent = isFast ? 'Speed: REAL' : 'Speed: FAST';
      this.classList.toggle('live', isFast);
      var modeLabel = isFast ? 'REAL · ' : 'FAST · ';
      document.getElementById('sMode').textContent = modeLabel + (isDark() ? 'dark' : 'light');
      visibleTime = 0;
      ambientStarted = false;
      clearTimeout(glitchTimer);
      clearTimeout(ambientTimer);
      scheduleGlitch(true);
    });

    /* extra: theme toggle, force-E, force-flavor */
    var controls = liveBtn.parentNode;
    var themeBtn = document.createElement('button');
    themeBtn.textContent = 'Theme: dark';
    themeBtn.addEventListener('click', function() {
      var cur = document.documentElement.getAttribute('data-mode');
      var next = cur === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-mode', next);
      this.textContent = 'Theme: ' + next;
      var modeLabel = (P === FAST ? 'FAST · ' : 'REAL · ') + next;
      document.getElementById('sMode').textContent = modeLabel;
    });
    controls.insertBefore(themeBtn, liveBtn);

    var forceFlavor = document.createElement('select');
    ['(random)', 'hum', 'pulse', 'chroma', 'slice', 'jolt', 'full'].forEach(function(n) {
      var o = document.createElement('option');
      o.value = n === '(random)' ? '' : n;
      o.textContent = n;
      forceFlavor.appendChild(o);
    });
    forceFlavor.addEventListener('change', function() {
      var name = this.value;
      if (!name) return;
      var f = FLAVORS.find(function(x) { return x.name === name; });
      if (f) fireGlitch(f);
      this.value = '';
    });
    controls.insertBefore(forceFlavor, liveBtn);

    var forceE = document.createElement('button');
    forceE.textContent = 'Force E';
    forceE.addEventListener('click', function() { burstVisible(2); });
    controls.insertBefore(forceE, liveBtn);

    var resetHero = document.createElement('button');
    resetHero.textContent = 'Reset weekly';
    resetHero.title = 'Clear localStorage to retest hero glitch';
    resetHero.addEventListener('click', function() {
      try { localStorage.removeItem(HERO_KEY); } catch (e) {}
      document.getElementById('sHero').textContent = 'reset · refresh page to retest';
      document.getElementById('sHero').className = 'v warn';
    });
    controls.insertBefore(resetHero, liveBtn);
  </script>
</body>
</html>
