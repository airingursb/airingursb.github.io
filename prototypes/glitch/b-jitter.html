<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B. JITTER — Cyber Prototypes</title>
<link rel="stylesheet" href="./shared.css">
<style>
  /* The whole content is wrapped in #jitter-stage so we can transform it
     without breaking sticky topbar. Topbar stays still. */
  #jitter-stage {
    will-change: transform, filter;
    transition: filter 0.4s;
  }

  /* slow brightness breathing layered on top */
  @keyframes breath {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.04); }
  }
  #jitter-stage { animation: breath 5.5s ease-in-out infinite; }

  /* faint neon edge on text — gives slight CRT bloom */
  #jitter-stage .name {
    text-shadow:
      0 0 6px rgba(var(--accent-rgb), 0.18),
      0 0 14px rgba(var(--accent-rgb), 0.08);
  }

  /* a thin vignette so trembling feels enclosed */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(
      ellipse at center,
      transparent 60%,
      rgba(0, 0, 0, 0.45) 100%
    );
    z-index: 9997;
  }
</style>
</head>
<body>
  <div class="topbar" id="topbar"></div>
  <div id="jitter-stage">
    <div class="scene"><div class="card" id="mockCard"></div></div>
    <div class="below" id="below"></div>
  </div>

  <script src="./shared.js"></script>
  <script>
    GLITCH.init('B', 'JITTER', 'Constant sub-pixel tremor — like a CRT humming.', {
      trigger: false, live: true, intensity: true
    });

    var live = true;
    var stage = document.getElementById('jitter-stage');
    var amplitude = 0.8; // px (medium)
    var jolt = 0;        // current jolt boost
    var rafId = null;

    function setIntensity(v) {
      amplitude = v === 'low' ? 0.35 : v === 'high' ? 2.4 : 0.8;
    }

    function tick() {
      if (!live) return;
      // background tremor
      var a = amplitude + jolt;
      var x = (Math.random() - 0.5) * a * 2;
      var y = (Math.random() - 0.5) * a * 2;
      // optional skew at high intensity
      var sk = amplitude > 1.5 ? (Math.random() - 0.5) * 0.18 : 0;
      stage.style.transform = 'translate(' + x.toFixed(2) + 'px,' + y.toFixed(2) + 'px) skewX(' + sk.toFixed(3) + 'deg)';
      // jolt decays
      if (jolt > 0) jolt = Math.max(0, jolt - 0.25);
      rafId = requestAnimationFrame(tick);
    }

    // every 4–9s, give it a small "spike" jolt — feels like a power surge
    function joltLoop() {
      if (!live) return;
      jolt = 3 + Math.random() * 4; // ~3–7px peak, decays in ~30 frames
      var next = 4000 + Math.random() * 5000;
      setTimeout(joltLoop, next);
    }

    document.getElementById('liveBtn').addEventListener('click', function() {
      live = !live;
      this.textContent = live ? 'Auto: ON' : 'Auto: OFF';
      this.classList.toggle('live', live);
      if (live) { tick(); joltLoop(); }
      else { if (rafId) cancelAnimationFrame(rafId); stage.style.transform = ''; }
    });
    document.getElementById('intensitySel').addEventListener('change', function() {
      setIntensity(this.value);
    });

    tick();
    setTimeout(joltLoop, 1500);
  </script>
</body>
</html>
