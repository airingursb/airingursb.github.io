      var switcher = document.getElementById('themeSwitcher');
      var modeToggle = document.getElementById('modeToggle');

      function updateModeIcon() {

      modeToggle.addEventListener('click', function(e) {

        document.documentElement.setAttribute('data-mode', next);
        localStorage.setItem('blog-mode', next);
        localStorage.setItem('blog-mode-set', '1');

          umami.track('dark-mode-toggle', { mode: next });
          umami.identify({ theme: next });
        }
      });
      updateModeIcon();
    })();

    (function () {

      var links = document.querySelector('.mast-bar .mast-links');

      // If a page already has its own mast-toggle, don't inject a duplicate
      if (bar.querySelector('.mast-toggle')) return;

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'mast-toggle';
      btn.setAttribute('aria-label', 'Open menu');
      btn.setAttribute('aria-expanded', 'false');
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4h12 M2 8h12 M2 12h12"/></svg>';
      bar.insertBefore(btn, links);

      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = links.classList.toggle('open');
        btn.setAttribute('aria-expanded', String(open));
      });
      document.addEventListener('click', function (e) {
        if (!links.contains(e.target) && !btn.contains(e.target)) {
          links.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        }
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && links.classList.contains('open')) {
          links.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        }
      });
    })();
