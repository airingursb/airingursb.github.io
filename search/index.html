    (function() {
      var toggle = document.getElementById('themeToggle');
      var dots = document.getElementById('themeDots');
      var switcher = document.getElementById('themeSwitcher');
      var modeToggle = document.getElementById('modeToggle');
      var open = false;

      // Mode toggle (light/dark)
      function updateModeIcon() {
        var isLight = document.documentElement.getAttribute('data-mode') === 'light';
        switcher.classList.toggle('light-mode', isLight);
      }
      modeToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var current = document.documentElement.getAttribute('data-mode');
        var next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-mode', next);
        localStorage.setItem('blog-mode', next);
        updateModeIcon();
      });
      updateModeIcon();

      // Color theme toggle
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        open = !open;
        dots.classList.toggle('active', open);
        toggle.classList.toggle('active', open);
      });

      dots.addEventListener('click', function(e) {
        var btn = e.target.closest('.theme-dot');
        if (!btn) return;
        var theme = btn.dataset.theme;
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('blog-theme', theme);
        dots.querySelectorAll('.theme-dot').forEach(function(d) {
          d.classList.toggle('selected', d.dataset.theme === theme);
        });
      });

      document.addEventListener('click', function(e) {
        if (!switcher.contains(e.target) && open) {
          open = false;
          dots.classList.remove('active');
          toggle.classList.remove('active');
        }
      });

      // Mark current theme
      var current = localStorage.getItem('blog-theme') || 'green';
      dots.querySelectorAll('.theme-dot').forEach(function(d) {
        d.classList.toggle('selected', d.dataset.theme === current);
      });
    })();
  </script> </body> </html>
