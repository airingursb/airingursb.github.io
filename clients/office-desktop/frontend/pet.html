<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Den</title>
<style>
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; cursor: grab; }
  body:active { cursor: grabbing; }
  #wrap { position: relative; width: 120px; height: 150px; }
  canvas { display: block; image-rendering: pixelated; }
  /* speech bubble — anchored just above the bear's head, kept inside the window */
  #bubble {
    position: absolute; left: 50%; top: 36px;
    transform: translateX(-50%) translateY(-100%);
    background: #2c2e36; color: #e6e3dc; font: 10px/1.3 -apple-system, system-ui, monospace;
    padding: 3px 7px; border-radius: 7px; white-space: nowrap; opacity: 0;
    transition: opacity .25s; pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,.35);
  }
  #bubble.show { opacity: 1; }
  #bubble::after { content: ''; position: absolute; left: 50%; bottom: -4px; transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: #2c2e36; }
</style>
</head>
<body>
<div id="wrap">
  <div id="bubble"></div>
  <canvas id="c" width="120" height="150"></canvas>
</div>
<script type="module">
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const bubble = document.getElementById('bubble');
const W = 120, H = 150;
ctx.imageSmoothingEnabled = false;   // crisp pixel-art scaling

// the REAL nook bear sprite (bear/asia atlas, 32×48 frames). Same art as the
// lounge so the pet matches the office characters exactly.
const SHEET = new Image();
SHEET.src = 'bear.png';
let sheetReady = false;
SHEET.onload = () => { sheetReady = true; };
const FRAME = { idle: 0, walk0: 128, walk1: 160, wave: 384, sit: 416 };  // x-offset in the sheet
const FW = 32, FH = 48, S = 2;        // frame size + integer scale → 64×96 on screen

// state fed by the office (when running in the desktop app); sensible defaults in a browser
let agents = 0, working = 0, failed = false, blocked = false;
let t = 0, wave = 0;

function showBubble(msg, ms = 1800) {
  bubble.textContent = msg; bubble.classList.add('show');
  clearTimeout(showBubble._t); showBubble._t = setTimeout(() => bubble.classList.remove('show'), ms);
}

function blit(sx, dx, dy) { ctx.drawImage(SHEET, sx, 0, FW, FH, dx, dy, FW * S, FH * S); }

function draw() {
  t += 0.05; ctx.clearRect(0, 0, W, H);
  const cx = W / 2, bob = Math.sin(t) * 2;     // idle breathing
  const footY = 130;                            // sprite bottom sits here

  // status ring under the bear: green pulse working, red failed, amber blocked, grey idle
  const ringColor = failed ? '#d44820' : blocked ? '#d8b048' : working > 0 ? '#5a8f4a' : '#6a6a70';
  const pulse = (working > 0 || failed || blocked) ? 1 + Math.sin(t * 2) * 0.12 : 1;
  ctx.globalAlpha = 0.25; ctx.fillStyle = ringColor;
  ctx.beginPath(); ctx.ellipse(cx, footY + 4, 26 * pulse, 9 * pulse, 0, 0, 7); ctx.fill();
  ctx.globalAlpha = 1;
  // ground shadow
  ctx.globalAlpha = 0.3; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(cx, footY + 2, 18, 6, 0, 0, 7); ctx.fill(); ctx.globalAlpha = 1;

  // pick the frame: waving > working (2-frame step) > idle
  let sx = FRAME.idle;
  if (wave > 0) { wave -= 0.03; sx = FRAME.wave; }
  else if (working > 0) sx = (Math.floor(t * 4) % 2) ? FRAME.walk1 : FRAME.walk0;

  if (sheetReady) blit(sx, cx - (FW * S) / 2, footY - FH * S + bob);

  // agent-count badge (upper-right of the bear) when there are agents
  if (agents > 0) {
    ctx.fillStyle = working > 0 ? '#5a8f4a' : '#6a6a70';
    ctx.beginPath(); ctx.arc(94, 42, 10, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(agents), 94, 43);
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ── interactions ──
// data-tauri-drag-region grabs every mousedown (eating click/dblclick), so we
// drag explicitly: once the pointer moves past a threshold we hand off to the OS
// via startDragging(); a clean click pokes the bear; double-click opens the office.
let down = false, dragging = false, downAt = 0, downX = 0, downY = 0;
function currentWindow() {
  const tw = window.__TAURI__;
  return tw?.window?.getCurrentWindow?.() || tw?.webviewWindow?.getCurrentWebviewWindow?.() || null;
}
addEventListener('mousedown', (e) => { down = true; dragging = false; downAt = Date.now(); downX = e.screenX; downY = e.screenY; });
addEventListener('mousemove', (e) => {
  if (!down || dragging) return;
  if (Math.hypot(e.screenX - downX, e.screenY - downY) > 4) {
    dragging = true;
    try { currentWindow()?.startDragging?.(); } catch {}
  }
});
addEventListener('mouseup', () => {
  if (down && !dragging && Date.now() - downAt < 350) { wave = 1; showBubble('双击进办公室'); }   // a poke
  down = false;
});
addEventListener('dblclick', () => { invoke('toggle_office'); showBubble('开门～'); });

// ── wire to the office (desktop only) ──
const tauri = window.__TAURI__;
function invoke(cmd) { tauri?.core?.invoke?.(cmd).catch(() => {}); }
if (tauri?.event?.listen) {
  invoke('start_office_bridge');
  let lastFailed = false;
  tauri.event.listen('office-state', (e) => {
    try {
      const snap = typeof e.payload === 'string' ? JSON.parse(e.payload) : e.payload;
      const as = snap.agents || [];
      agents = as.length;
      working = as.filter(a => !['idle', 'life', 'social'].includes(a.cat) && a.cat !== 'blocked').length;
      failed = as.some(a => a.state === 'life_failed');
      blocked = as.some(a => a.cat === 'blocked');
      if (failed && !lastFailed) { wave = 1; showBubble('有 agent 崩了 ✗', 3000); }
      lastFailed = failed;
    } catch {}
  });
}
</script>
</body>
</html>
